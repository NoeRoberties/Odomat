name: Push to Epitech's EIP repository

env:
  MIRROR_URL: "git@github.com:EpitechPGE3-2025/G-EIP-600-TLS-6-1-eip-4.git"

on:
  push:
    branches: 
      - main

jobs: 
  push-to-mirror:
    runs-on: ubuntu-latest 
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to mirror
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}